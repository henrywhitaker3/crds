crds:
  - group: dragonflydb.io
    # renovate: datasource=github-tags depName=dragonflydb/dragonfly-operator
    ref: v1.5.0
    template: https://raw.githubusercontent.com/dragonflydb/dragonfly-operator/refs/tags/{{ version }}/config/crd/bases/dragonflydb.io_{{ name }}.yaml
    names:
      - dragonflies

  - group: k8s.mariadb.com
    # renovate: datasource=github-tags depName=mariadb-operator/mariadb-operator
    ref: v26.3.0
    template: https://raw.githubusercontent.com/mariadb-operator/mariadb-operator/refs/tags/{{ version }}/config/crd/bases/k8s.mariadb.com_{{ name }}.yaml
    names:
      - backups
      - connections
      - databases
      - externalmariadbs
      - grants
      - mariadbs
      - maxscales
      - physicalbackups
      - pointintimerecoveries
      - restores
      - sqljobs
      - users

  - group: postgres-operator.crunchydata.com
    # renovate: datasource=github-tags depName=CrunchyData/postgres-operator
    ref: v6.0.1
    template: https://raw.githubusercontent.com/CrunchyData/postgres-operator/refs/tags/{{ version }}/config/crd/bases/postgres-operator.crunchydata.com_{{ name }}.yaml
    names:
      - pgadmins
      - pgupgrades
      - postgresclusters

  - group: gateway.networking.k8s.io
    subgroup: experimental
    # renovate: datasource=github-tags depName=kubernetes-sigs/gateway-api
    ref: v1.5.1
    template: https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/refs/tags/{{ version }}/config/crd/experimental/gateway.networking.k8s.io_{{ name }}.yaml
    names:
      - backendtlspolicies
      - gatewayclasses
      - gateways
      - grpcroutes
      - httproutes
      - listenersets
      - referencegrants
      - tcproutes
      - tlsroutes
      - udproutes

  - group: gateway.networking.k8s.io
    subgroup: standard
    # renovate: datasource=github-tags depName=kubernetes-sigs/gateway-api
    ref: v1.5.1
    template: https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/refs/tags/{{ version }}/config/crd/standard/gateway.networking.k8s.io_{{ name }}.yaml
    names:
      - backendtlspolicies
      - gatewayclasses
      - gateways
      - grpcroutes
      - httproutes
      - listenersets
      - referencegrants
      - tlsroutes
