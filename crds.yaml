crds:
  - group: dragonflydb.io
    # renovate: datasource=github-tags depName=dragonflydb/dragonfly-operator
    ref: v1.5.0
    template: https://raw.githubusercontent.com/dragonflydb/dragonfly-operator/refs/tags/{{ version }}/config/crd/bases/dragonflydb.io_{{ name }}.yaml
    names:
      - dragonflies

  - group: k8s.mariadb.com
    # renovate: datasource=github-tags depName=mariadb-operator/mariadb-operator
    ref: v26.3.0
    template: https://raw.githubusercontent.com/mariadb-operator/mariadb-operator/refs/tags/{{ version }}/config/crd/bases/k8s.mariadb.com_{{ name }}.yaml
    names:
      - backups
      - connections
      - databases
      - externalmariadbs
      - grants
      - mariadbs
      - maxscales
      - physicalbackups
      - pointintimerecoveries
      - restores
      - sqljobs
      - users

  - group: postgres-operator.crunchydata.com
    # renovate: datasource=github-tags depName=CrunchyData/postgres-operator
    ref: v6.0.1
    template: https://raw.githubusercontent.com/CrunchyData/postgres-operator/refs/tags/{{ version }}/config/crd/bases/postgres-operator.crunchydata.com_{{ name }}.yaml
    names:
      - pgadmins
      - pgupgrades
      - postgresclusters

  - group: gateway.networking.k8s.io
    subgroup: experimental
    # renovate: datasource=github-tags depName=kubernetes-sigs/gateway-api
    ref: v1.5.1
    template: https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/refs/tags/{{ version }}/config/crd/experimental/gateway.networking.k8s.io_{{ name }}.yaml
    names:
      - backendtlspolicies
      - gatewayclasses
      - gateways
      - grpcroutes
      - httproutes
      - listenersets
      - referencegrants
      - tcproutes
      - tlsroutes
      - udproutes

  - group: gateway.networking.k8s.io
    subgroup: standard
    # renovate: datasource=github-tags depName=kubernetes-sigs/gateway-api
    ref: v1.5.1
    template: https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/refs/tags/{{ version }}/config/crd/standard/gateway.networking.k8s.io_{{ name }}.yaml
    names:
      - backendtlspolicies
      - gatewayclasses
      - gateways
      - grpcroutes
      - httproutes
      - listenersets
      - referencegrants
      - tlsroutes

  - group: external-secrets.io
    # renovate: datasource=github-tags depName=external-secrets/external-secrets
    ref: v2.3.0
    template: https://raw.githubusercontent.com/external-secrets/external-secrets/refs/tags/{{ version }}/config/crds/bases/external-secrets.io_{{ name }}.yaml
    names:
      - clusterexternalsecrets
      - clusterpushsecrets
      - clustersecretstores
      - externalsecrets
      - pushsecrets
      - secretstores

  - group: generators.external-secrets.io
    # renovate: datasource=github-tags depName=external-secrets/external-secrets
    ref: v2.3.0
    template: https://raw.githubusercontent.com/external-secrets/external-secrets/refs/tags/{{ version }}/config/crds/bases/generators.external-secrets.io_{{ name }}.yaml
    names:
      - acraccesstokens
      - cloudsmithaccesstokens
      - clustergenerators
      - ecrauthorizationtokens
      - fakes
      - gcraccesstokens
      - generatorstates
      - githubaccesstokens
      - grafanas
      - mfas
      - passwords
      - quayaccesstokens
      - sshkeys
      - stssessiontokens
      - uuids
      - vaultdynamicsecrets
      - webhooks

  - group: cert-manager.io
    # renovate: datasource=github-tags depName=cert-manager/cert-manager
    ref: v1.20.2
    template: https://raw.githubusercontent.com/cert-manager/cert-manager/refs/tags/{{ version }}/deploy/crds/cert-manager.io_{{ name }}.yaml
    names:
      - certificaterequests
      - certificates
      - clusterissuers
      - issuers

  - group: acme.cert-manager.io
    # renovate: datasource=github-tags depName=cert-manager/cert-manager
    ref: v1.20.2
    template: https://raw.githubusercontent.com/cert-manager/cert-manager/refs/tags/{{ version }}/deploy/crds/acme.cert-manager.io_{{ name }}.yaml
    names:
      - challenges
      - orders

  - group: gateway.envoyproxy.io
    # renovate: datasource=github-tags depName=envoyproxy/gateway
    ref: v1.7.2
    template: https://raw.githubusercontent.com/envoyproxy/gateway/refs/tags/{{ version }}/charts/gateway-helm/crds/generated/gateway.envoyproxy.io_{{ name }}.yaml
    names:
      - backends
      - backendtrafficpolicies
      - clienttrafficpolicies
      - envoyextensionpolicies
      - envoypatchpolicies
      - envoyproxies
      - httproutefilters
      - securitypolicies

  - group: argoproj.io
    # renovate: datasource=github-tags depName=argoproj/argo-cd
    ref: v3.3.7
    template: https://raw.githubusercontent.com/argoproj/argo-cd/refs/tags/{{ version }}/manifests/crds/{{ name }}-crd.yaml
    names:
      - application
      - applicationset
      - appproject

  - group: kyverno
    subgroup: kyverno.io
    # renovate: datasource=github-tags depName=kyverno/kyverno
    ref: v1.17.1
    template: https://raw.githubusercontent.com/kyverno/kyverno/refs/tags/{{ version }}/config/crds/kyverno/kyverno.io_{{ name }}.yaml
    names:
      - cleanuppolicies
      - clustercleanuppolicies
      - clusterpolicies
      - policies
      - globalcontextentries
      - policyexceptions
      - updaterequests

  - group: kyverno
    subgroup: policies.kyverno.io
    # renovate: datasource=github-tags depName=kyverno/kyverno
    ref: v1.17.1
    template: https://raw.githubusercontent.com/kyverno/kyverno/refs/tags/{{ version }}/config/crds/policies.kyverno.io/policies.kyverno.io_{{ name }}.yaml
    names:
      - deletingpolicies
      - generatingpolicies
      - imagevalidatingpolicies
      - mutatingpolicies
      - namespaceddeletingpolicies
      - namespacedgeneratingpolicies
      - namespacedimagevalidatingpolicies
      - namespacedmutatingpolicies
      - namespacedvalidatingpolicies
      - policyexceptions
      - validatingpolicies

  - group: renovate-operator.mogenius.com
    # renovate: datasource=github-tags depName=mogenius/renovate-operator
    ref: 4.3.5
    template: https://raw.githubusercontent.com/mogenius/renovate-operator/refs/tags/{{ version }}/charts/renovate-operator/crd/renovate-operator.mogenius.com_{{ name }}.yaml
    names:
      - renovatejobs

  - group: monitoring.coreos.com
    # renovate: datasource=github-tags depName=prometheus-operator/prometheus-operator
    ref: v0.90.1
    template: https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/refs/tags/{{ version }}/example/prometheus-operator-crd-full/monitoring.coreos.com_{{ name }}.yaml
    names:
      - alertmanagerconfigs
      - alertmanagers
      - podmonitors
      - probes
      - prometheusagents
      - prometheuses
      - prometheusrules
      - scrapeconfigs
      - servicemonitors
      - thanosrulers

collections:
  - group: networking.istio.io
