name: Publish

on:
  push:
    branches: [main]
    paths:
      - crds.yaml
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.5.0
        with:
          go-version-file: go.mod
      - name: Generate
        run: go run main.go
      - uses: stefanzweifel/git-auto-commit-action@v7.1.0
        with:
          commit_message: "fix(schemas): generate schemas"
          file_pattern: "schemas/"
