name: Publish

on:
  push:
    branches: [main]
    paths:
      - crds.yaml
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Generate schemas
        env:
          UV_SYSTEM_PYTHON: 1
        run: |
          uv python install
          uv pip install -r requirements.txt
          uv run main.py
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "fix(schemas): generate schemas"
          file_pattern: "schemas/"
